services:

  api:
    container_name: api
    build: 
      context: .
      dockerfile: docker/app/Dockerfile
    ports:
      - 8000:8000
    volumes:
      - ./src:/src/src
      - ./uploads:/src/uploads
    networks:
      - backend_network
    env_file:
      - ./.env
    command: "poetry run uvicorn --factory src.api.main:create_app --reload --host 0.0.0.0 --port 8000"
    restart: always
    depends_on:
      postgres:
        condition: service_healthy  
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  postgres:
    image: postgres:18.1
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: database
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql 
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "user", "-d", "database"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis: 
    image: redis:latest
    container_name: redis
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrations:
    container_name: migrations
    build: 
      context: .
      dockerfile: docker/migrations/Dockerfile
    volumes:
      - ./alembic:/src/alembic
    command: "alembic upgrade head"
    networks:
      - backend_network
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy  

